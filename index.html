<script>
(() => {
  const LS_KEY = "tennis_menu_final_v1";

  const GOALS = [
    {key:"any", label:"指定なし"},
    {key:"basic", label:"基礎"},
    {key:"rally", label:"ラリー"},
    {key:"serve", label:"サーブ"},
    {key:"volley", label:"ボレー"},
    {key:"game", label:"ゲーム"},
    {key:"footwork", label:"フットワーク"},
  ];

  /**
   * メニュー定義
   * - minP/maxP: 1コートあたり適正人数
   * - minutes: [min,max] 推奨時間
   * - goals: 目的
   * - intensity: 1(軽)〜5(きつい)
   */
  const SEED = [
    { id:"mini", name:"ミニテニス（サービスライン内）", minP:2, maxP:4, minutes:[8,15],
      goals:["basic","rally"], intensity:1, setup:"サービスボックス内でのみプレー。力は8割程度に抑える。ネットを越える角度を意識。4人の場合は対角で2対2、または1人がコーチとなって球出し。", desc:"テニスの基本となるラケット面とボール感覚を身につけるウォームアップ。力を抜いて安定性とタッチを磨きます。初心者向けの最適なスタートメニュー。目安は往復20回以上の継続。" },
    { id:"cross", name:"クロスラリー（左右）", minP:2, maxP:4, minutes:[10,25],
      goals:["basic","rally","footwork"], intensity:3, setup:"コート対角線上でのみ打つ（例：右奥から左奥へ）。コースが決まっているため、打つコーナーと動く距離が予測しやすい。4人なら①②vs③④で交代制。ミスまたは20往復達成で交代推奨。", desc:"斜めの方向に打つため、体の使い方とフットワークが自然に身につきます。初心者がまず習得すべき典型的なラリー形式からテニスの流れを学べます。目標は20往復以上、ミス1回以内の精度を達成。" },
    { id:"switch", name:"クロス→ストレート切替ラリー（指示で方向変更）", minP:2, maxP:4, minutes:[10,25],
      goals:["rally","basic"], intensity:3, setup:"まずクロスでラリーを開始。コーチが「ストレート」と合図したら即座に方向を180度変更。常に相手の深さを優先し、ネットより1～2m奥を狙う。4人なら①②vs③④で実施。", desc:"テニスゲームでは相手の動きに応じてコースを変える必要があります。このドリルでクロス・ストレート両方の動作を効率よく習得できます。判断力と素早い動作の変更を磨きます。" },
    { id:"serveR", name:"サーブ＆リターン（交代制）", minP:2, maxP:6, minutes:[10,30],
      goals:["serve","game"], intensity:2, setup:"サーバーは2～3本サーブを打ったら交代。リターナーはゲーム形式で点を取る。球拾いは待機組が担当し常にテンポを保つ。コースを意識：1stサーブはセンターマーク方向、2ndサーブはワイド。リターンは必ずセンター方向に返球を心がける。", desc:"テニスゲームは「サーブ」と「リターン」からスタート。正確で安定したサーブ、そして相手のサーブに対応する返球力が大切です。このメニューでゲームの基本サイクルを繰り返し習得します。" },
    { id:"targetS", name:"的当てサーブ（点数制ゲーム）", minP:1, maxP:6, minutes:[10,25],
      goals:["serve"], intensity:2, setup:"コーン・マーカー・タオルなどをサービスボックスの四隅または中央に配置。1stサーブで的に当たると10点、2ndサーブで当たると5点など、ルールを決める。1人で順番に打つか、複数人で競わせる。", desc:"単純なサーブ練習より、『具体的な狙い』を持つことでサーブの精度が飛躍的に向上します。初心者はコース感覚を身につけられます。またゲーム形式にすることで楽しみながら上達できます。" },
    { id:"approach", name:"アプローチ＆ネットプレー（ボレー・スマッシュ含む）", minP:3, maxP:6, minutes:[10,25],
      goals:["volley","footwork","game"], intensity:4, setup:"コーチが浅いボールを出す。プレイヤーはそれを打ってネットに詰める→相手のロブに対応→スマッシュまたはボレーで決める。ロブも時々混ぜる。3人なら球出し役1名、対戦2名で交代。安全のため周囲を確認。", desc:"テニスで得点するには『ネットに詰める戦術』が重要。このメニューはベースラインからの脱出、ネットプレーでの短い距離での判断と反応、攻撃的なスマッシュまで、一連の実戦的な動作を習得できます。中級者への第一歩。" },
    { id:"king", name:"キング・オブ・コート（ゲーム形式・回転制）", minP:4, maxP:8, minutes:[10,30],
      goals:["game","rally"], intensity:4, setup:"1コート1ゲーム。王様ペア vs チャレンジャーペア。王様が先に5点取ったら勝ち残り。チャレンジャーが勝つと王様に昇格。負けたペアはコート外で待機。6～8人の場合はコート外でペアを作り、順番に交代。テンポを重視。", desc:"実際のゲームと同じルールで複数回プレーできるため、実戦感覚を養えます。『試合に勝つ』という目標のもと、判断・体力・メンタルが全て試されます。初心者から中級者まで幅広く対応でき、集中力とモチベーション向上に最適です。" },
    { id:"ctb", name:"チャンピオンタイブレーク（短時間実戦・回転制）", minP:4, maxP:10, minutes:[10,25],
      goals:["game","serve"], intensity:3, setup:"タイブレークルール：1～10点を取った方が優勝。サーブはサーバーが1本打ってから交代可能。6～10人なら1回のタイブレーク終了後にペアを交代。短時間でたくさんのゲームを回す。7点の『チェンジエンド』を含める。", desc:"通常のゲームより短時間で実戦経験を積める効率的なメニュー。サーブもリターンもラリーも全てが試され、最後の集中力が勝敗を分けます。テンポよくたくさん回すことで、初心者の実戦感覚が急速に磨かれます。" },
    { id:"feed", name:"球出しフットワーク（左右・前後・パターン変化）", minP:2, maxP:6, minutes:[8,20],
      goals:["footwork","basic"], intensity:5, setup:"コーチがコーン位置に球を出す。プレイヤーはバックコートで左右に移動して打つ、または前後に移動して打つ。10球×3セット推奨。セット間は30秒休息。安全のため周囲に人がいないか確認し、フォームは『常に安定』を優先。無理に決めようとしない。", desc:"フットワークはテニスの基礎中の基礎。体を正しい位置に運ぶ力があれば、どんなボールにも対応できます。このドリルで『足を動かす習慣』『姿勢の保持』『安定したフォーム』が身につきます。初心者も上級者も毎回実施推奨。" },
  ];

  const $ = (id) => document.getElementById(id);
  const state = { players:4, minutes:15, goal:"any", lastShift:0 };

  const clamp = (n,a,b) => Math.max(a, Math.min(b, n));

  function loadMenu(){
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return SEED;
    try { const v = JSON.parse(raw); return Array.isArray(v) ? v : SEED; }
    catch(e){ return SEED; }
  }

  function saveMenu(menu){
    localStorage.setItem(LS_KEY, JSON.stringify(menu, null, 2));
  }

  function gLabel(key){
    const g = GOALS.find(x => x.key === key);
    return g ? g.label : key;
  }

  function intensityBar(n){
    n = clamp(n,1,5);
    return "■".repeat(n) + "□".repeat(5-n);
  }

  function scoreMenu(item){
    const p = state.players;
    const goal = state.goal;
    const minutes = state.minutes;

    let score = 0;
    const reasons = [];

    // 人数適合
    const okP = (p >= item.minP && p <= item.maxP);
    if(okP){ score += 55; reasons.push("人数に適合"); }
    else{
      const dist = (p < item.minP) ? (item.minP - p) : (p - item.maxP);
      score -= 22 * dist;
      reasons.push("人数が適合範囲外");
    }

    // 目的一致
    if(goal === "any") score += 10;
    else if((item.goals || []).includes(goal)){ score += 25; reasons.push("目的に合う"); }
    else { score -= 10; reasons.push("目的とズレ"); }

    // 時間適合
    const [minT, maxT] = item.minutes || [10, 20];
    if(minutes >= minT && minutes <= maxT){ score += 15; reasons.push("時間にちょうど良い"); }
    else{
      const dist = (minutes < minT) ? (minT - minutes) : (minutes - maxT);
      score -= Math.min(15, dist);
      reasons.push("時間がややズレ");
    }

    // 大人数の回転系は少し優遇
    const name = item.name || "";
    if(p >= 7 && (name.includes("回転") || name.includes("キング") || name.includes("タイブレ"))){
      score += 10; reasons.push("大人数でも回しやすい");
    }

    // 短時間で高強度なら少し優遇
    if(minutes <= 12 && (item.intensity || 1) >= 4) score += 5;

    return {score, reasons, okP};
  }

  function renderChips(){
    const root = $("chips");
    root.innerHTML = "";
    for(const g of GOALS){
      const el = document.createElement("div");
      el.className = "chip" + (state.goal === g.key ? " active" : "");
      el.textContent = g.label;
      el.addEventListener("click", () => {
        state.goal = g.key;
        state.lastShift = 0;
        renderAll();
      });
      root.appendChild(el);
    }
  }

  function cardHTML(m, s, isTop){
    const goals = (m.goals || []).map(gLabel);
    const okTag = s.okP
      ? `<span class="tag ok">${m.minP}-${m.maxP}人</span>`
      : `<span class="tag warn">${m.minP}-${m.maxP}人</span>`;

    return `
      <div class="card">
        <div class="cardTop">
          <div>
            <div class="name">${isTop ? "⭐ " : ""}${m.name || "(名称なし)"}</div>
            <div class="meta">
              ${okTag}
              <span class="tag">目安 ${(m.minutes?.[0] ?? 10)}-${(m.minutes?.[1] ?? 20)}分</span>
              <span class="tag">強度 ${intensityBar(m.intensity || 1)}</span>
            </div>
            <div class="meta">
              ${goals.map(t => `<span class="tag">${t}</span>`).join("")}
            </div>
          </div>
          <span class="tag">Score ${s.score}</span>
        </div>

        <div class="desc">${m.desc || ""}</div>

        <details>
          <summary>詳細 / 準備</summary>
          <div class="detailBox">
            <div class="desc">🧰 準備：${m.setup || "—"}</div>
            <div class="reason">🔎 推奨理由：${(s.reasons || []).slice(0,3).join(" / ") || "—"}</div>
          </div>
        </details>
      </div>
    `;
  }

  function suggest(shuffle){
    const menu = loadMenu();
    const scored = menu.map(m => ({m, ...scoreMenu(m)})).sort((a,b) => b.score - a.score);
    const ok = scored.filter(x => x.score > 0);

    if(ok.length === 0) return {top3:[], list:scored};

    if(shuffle) state.lastShift = (state.lastShift + 1) % Math.min(5, ok.length);
    else state.lastShift = 0;

    const top3 = [];
    for(let i=0;i<3;i++){
      const idx = clamp(i + state.lastShift, 0, ok.length - 1);
      top3.push(ok[idx]);
    }

    return {top3, list:scored};
  }

  function renderAll(shuffle=false){
    state.players = clamp(state.players, 1, 12);
    state.minutes = clamp(parseInt($("minutes").value || "15", 10), 5, 180);

    $("pValue").textContent = state.players;
    $("condTag").textContent = `${state.players}人 / ${state.minutes}分 / ${gLabel(state.goal)}`;

    renderChips();

    const menu = loadMenu();
    $("menuJson").value = JSON.stringify(menu, null, 2);

    const {top3, list} = suggest(shuffle);

    $("top3").innerHTML = top3.length
      ? top3.map(x => cardHTML(x.m, x, true)).join("")
      : `<div class="card"><div class="name">候補がありません</div><div class="desc">人数・目的・時間を変えてみてください。</div></div>`;

    $("list").innerHTML = list.map(x => cardHTML(x.m, x, false)).join("");

    const okCount = list.filter(x => x.score > 0).length;
    $("countTag").textContent = `${okCount}件`;

    $("status").textContent = `条件：${state.players}人/コート・${state.minutes}分・目的「${gLabel(state.goal)}」`;
    $("topBadge").textContent = top3.length ? "Suggested" : "No match";
  }

  // イベント
  $("plus").addEventListener("click", () => { state.players++; renderAll(false); });
